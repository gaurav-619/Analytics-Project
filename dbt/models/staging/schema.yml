version: 2
sources:
  - name: marketing_analytics
    database: dark-bit-493307-d3
    schema: marketing_analytics

    tables:
      - name: raw_transactions
      - name: raw_products
      - name: raw_transactions_incremental
      - name: raw_customers
      - name: raw_campaigns
      - name: raw_events

models:

  # =========================
  # STAGING MODELS
  # =========================

  - name: stg_transactions
    description: "Cleaned and standardized transaction staging model"

    columns:
      - name: transaction_id
        description: "Unique transaction identifier"
        tests:
          - not_null
          - unique

      - name: timestamp
        description: "Transaction timestamp converted to TIMESTAMP datatype"

      - name: customer_id
        description: "Customer associated with transaction"
        tests:
          - not_null

      - name: product_id
        description: "Product identifier normalized to INT64"

      - name: quantity
        description: "Quantity of products purchased"

      - name: discount_applied
        description: "Discount percentage applied to transaction"

      - name: gross_revenue
        description: "Raw transaction revenue including refunds"

      - name: net_revenue
        description: "Business revenue metric excluding refunds"

      - name: campaign_id
        description: "Marketing campaign associated with transaction"

      - name: refund_flag
        description: "Indicates whether transaction was refunded"
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                quote: false

  - name: stg_products
    description: "Cleaned and deduplicated product staging model"

    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - not_null
          - unique

      - name: category
        description: "Product category"

      - name: brand
        description: "Product brand"

      - name: base_price
        description: "Base product price"

      - name: launch_date
        description: "Product launch date"

      - name: is_premium
        description: "Indicates whether product is premium"
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                quote: false

  - name: stg_customers
    description: "Cleaned customer staging model"

    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - not_null
          - unique

      - name: signup_date
        description: "Customer signup date"

      - name: country
        description: "Customer country"

      - name: age
        description: "Customer age"

      - name: gender
        description: "Customer gender"

      - name: loyalty_tier
        description: "Customer loyalty tier"

      - name: acquisition_channel
        description: "Customer acquisition source"

  - name: stg_campaigns
    description: "Cleaned marketing campaigns staging model"

    columns:
      - name: campaign_id
        description: "Unique campaign identifier"
        tests:
          - not_null
          - unique

      - name: channel
        description: "Marketing channel"

      - name: objective
        description: "Campaign objective"

      - name: start_date
        description: "Campaign start date"

      - name: end_date
        description: "Campaign end date"

      - name: target_segment
        description: "Target customer segment"

      - name: expected_uplift
        description: "Expected revenue uplift percentage"

  - name: stg_events
    description: "Cleaned marketing events staging model"

    columns:
      - name: event_id
        description: "Unique event identifier"
        tests:
          - not_null
          - unique

      - name: timestamp
        description: "Timestamp of event"

      - name: customer_id
        description: "Customer associated with event"

      - name: campaign_id
        description: "Campaign associated with event"

      - name: product_id
        description: "Product associated with event"

      - name: device_type
        description: "Device used for event"

      - name: traffic_source
        description: "Traffic source for event"

      - name: page_category
        description: "Page category for event"

      - name: session_duration_sec
        description: "Session duration in seconds"

      - name: experiment_group
        description: "Experiment group for event"

  # =========================
  # DIMENSION MODELSj
  # =========================

  - name: dim_products
    description: "Product dimension table"

    columns:
      - name: product_id
        description: "Primary key for products"
        tests:
          - not_null
          - unique

  - name: dim_customers
    description: "Customer dimension table"

    columns:
      - name: customer_id
        description: "Primary key for customers"
        tests:
          - not_null
          - unique

  - name: dim_campaigns
    description: "Campaign dimension table"

    columns:
      - name: campaign_id
        description: "Primary key for campaigns"
        tests:
          - not_null
          - unique

  # =========================
  # FACT MODELS
  # =========================

  - name: fct_transactions
    description: "Fact table containing commercial transaction events"

    columns:
      - name: transaction_id
        description: "Unique transaction identifier"
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Foreign key to dim_customers"
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: product_id
        description: "Foreign key to dim_products"
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_id

      - name: campaign_id
        description: "Foreign key to dim_campaigns"
        tests:
          - relationships:
              to: ref('dim_campaigns')
              field: campaign_id
  
  - name: fct_events
    description: "Fact table containing behavioral event activity"

    columns:
      - name: event_id
        description: "Unique event identifier"
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Foreign key to dim_customers"
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: product_id
        description: "Foreign key to dim_products"
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_id

      - name: campaign_id
        description: "Foreign key to dim_campaigns"
        tests:
          - relationships:
              to: ref('dim_campaigns')
              field: campaign_id


 # =========================
# MART MODELS
# =========================

  - name: mart_sales_summary
    description: "Aggregated sales performance mart"

  - name: mart_campaign_performance
    description: "Campaign performance analytics mart combining behavioral and commercial metrics"

  - name: mart_customer_analytics
    description: "Customer-level analytical mart combining engagement and revenue metrics"

  - name: mart_conversion_funnel
    description: "Conversion funnel mart used to analyze customer progression through the purchase journey and identify drop-off points"

  - name: mart_ab_test_performance
    description: "A/B testing performance mart used to evaluate experiment variants, conversion rates, and user engagement"

  - name: mart_customer_cohort_retention
    description: "Customer cohort retention mart used to analyze customer retention trends across signup cohorts" 